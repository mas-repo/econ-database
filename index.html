<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKDSE Economics Questions Database</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- Global loading indicator -->
    <div id="loading-indicator">載入中...</div>

    <!-- The entire app UI is rendered into this container by js/ui-bootstrap.js -->
    <div id="app" class="container"></div>

    <!-- Scroll to top -->
    <button id="scroll-to-top" onclick="scrollToTop()" title="回到頂部">↑</button>

    <!-- 1. Core state & configuration (must load first) -->
    <script src="js/globals.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/config.js"></script>

    <!-- 2. Data layer -->
    <script src="js/auth.js"></script>
    <script src="js/storage-core.js"></script>
    <script src="js/storage-filters.js"></script>
    <script src="js/storage-sync.js"></script>

    <!-- 3. UI Templates (HTML generators) + bootstrap (injects into #app) -->
    <script src="js/templates/template-header.js"></script>
    <script src="js/templates/template-filters.js"></script>
    <script src="js/templates/template-form.js"></script>
    <script src="js/templates/template-tabs.js"></script>
    <script src="js/templates/template-modals.js"></script>
    <script src="js/ui-bootstrap.js"></script>

    <!-- 4. Logic & interaction (DOM now exists) -->
    <script src="js/utils.js"></script>
    <script src="js/sort.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/filter-modal.js"></script>
    <script src="js/render.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/forms.js"></script>
    <script src="js/tabs.js"></script>
    <script src="js/statistics.js"></script>
    <script src="js/import-export.js"></script>
    <script src="js/admin.js"></script>

    <!-- 5. Bootstrapper (must load last) -->
    <script src="js/main.js"></script>
</body>
</html>
