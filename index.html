<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico?v2" sizes="any">
    <!-- SVG Favicon (Modern Browsers) -->
    <link rel="icon" href="icon.svg?v2" type="image/svg+xml">
    <title>HKDSE Economics Questions Database</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <!-- Loading Indicator -->
    <div id="loading-indicator">載入中...</div>

    <!-- Main Container -->
    <div class="container">
        <header>
            <h1>📚 HKDSE 經濟科題目資料庫</h1>
            <p>管理及搜尋 HKDSE、HKCEE、HKALE 經濟科試題</p>
            <!-- Storage status and reload button on same line -->
            <div style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 15px;">
                <div id="storage-status" style="color: rgba(255,255,255,0.9); font-size: 14px; min-width: 150px;">檢查資料庫...</div>
                <button onclick="manualSync()" class="btn btn-info">🔄 重新載入資料</button>
            </div>
        </header>      
        <nav class="tabs">
            <button class="tab active" onclick="switchTab('questions')">題目</button>
            <!-- <button class="tab" onclick="switchTab('publishers')">出版商</button> -->
            <!-- <button class="tab" onclick="switchTab('topics')">課程分類</button> -->
            <!-- <button class="tab" onclick="switchTab('concepts')">涉及概念</button> -->
            <!-- <button class="tab" onclick="switchTab('patterns')">題目類型</button> -->
        </nav>

        <main>
            <!-- Questions Tab -->
            <div id="questions-tab" class="tab-content active">
                <!-- Search & Primary Filters Section -->
                <div class="filters-container">
              
                    <!-- Row 1: Search Bar Group -->
                    <div class="search-row">
                        <div class="search-input-group">
                            <div class="scope-select-wrapper">
                                <select id="search-scope">
                                    <!-- Options populated by JS -->
                                    <option value="all">全部欄位</option>
                                </select>
                            </div>
                            <input type="text" id="search" placeholder="輸入關鍵字搜尋..." autocomplete="off">
                            <div class="search-icon">🔍</div>
                        </div>
                    </div>
                    <!-- Active Filters Display (Badges) -->
                    <div id="active-filters-display" class="active-filters-panel" style="display: none;"></div>     
                    <!-- Row 2: Primary Filters Grid -->
                    <div class="filter-primary-grid">
                        
                        <!-- Exam Type Filter -->
                        <div class="filter-item dropdown-filter">
                            <button class="dropdown-btn" onclick="toggleDropdown('exam-list')">
                               📝 考試 <span class="arrow">▶</span>
                            </button>
                            <div id="indicator-exam" class="active-indicator"></div>
                            <div id="exam-list" class="dropdown-content">
                                <div class="tri-state-label" onclick="toggleTriState(this)" data-filter="exam" data-value="HKDSE">
                                    <div class="tri-state-checkbox" data-filter="exam" data-value="HKDSE">HKDSE</div>
                                </div>
                                <div class="tri-state-label" onclick="toggleTriState(this)" data-filter="exam" data-value="HKCEE">
                                    <div class="tri-state-checkbox" data-filter="exam" data-value="HKCEE">HKCEE</div>
                                </div>
                                <div class="tri-state-label" onclick="toggleTriState(this)" data-filter="exam" data-value="HKALE">
                                    <div class="tri-state-checkbox" data-filter="exam" data-value="HKALE">HKALE</div>
                                </div>
                            </div>
                        </div>

                        <!-- YEAR FILTER SECTION -->
                        <div class="filter-item dropdown-filter">
                            <button id="year-filter-btn" class="dropdown-btn" onclick="toggleDropdown('year-options')">
                                📅 年份 <span id="year-arrow" class="arrow">▶</span>
                                <div id="indicator-year" class="active-indicator"></div>
                            </button>
                            <!-- Grid Layout similar to Chapters -->
                            <div id="year-options" class="dropdown-content" style="display: none;">
                                <div class="filter-actions" style="padding: 8px; border-bottom: 1px solid var(--border-color); margin-bottom: 8px; display: flex; gap: 10px;">
                                    <button class="text-btn" onclick="selectAllYears()" style="font-size: 0.9em; cursor: pointer; color: var(--primary-color); background: none; border: none;">全選</button>
                                    <button class="text-btn" onclick="clearYearFilter()" style="font-size: 0.9em; cursor: pointer; color: var(--danger-color); background: none; border: none;">🗑️ 清除</button>
                                </div>
                                <!-- The years will be injected here by JavaScript -->
                                <div id="year-list" class="grid-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; padding: 0 8px 8px 8px;">
                                </div>
                            </div>
                        </div>

                        <!-- Question Type -->
                        <div class="filter-item dropdown-filter">
                            <button class="dropdown-btn" onclick="toggleDropdown('qtype-list')">
                               📝 題目類型 <span class="arrow">▶</span>
                            </button>
                            <div id="indicator-qtype" class="active-indicator"></div>
                            <div id="qtype-list" class="dropdown-content">
                                <div class="tri-state-label" onclick="toggleTriState(this)" data-filter="qtype" data-value="MC">
                                    <div class="tri-state-checkbox" data-filter="qtype" data-value="MC">MC</div>
                                </div>
                                <div class="tri-state-label" onclick="toggleTriState(this)" data-filter="qtype" data-value="文字題 (SQ/LQ)">
                                    <div class="tri-state-checkbox" data-filter="qtype" data-value="文字題 (SQ/LQ)">文字題 (SQ/LQ)</div>
                                </div>
                            </div>
                        </div>

                        <!-- Curriculum Filter Section -->
                        <div class="filter-item dropdown-filter">
                            <button class="dropdown-btn" onclick="toggleDropdown('curriculum-options')">
                                <span>📚 課程分類</span>
                                <span id="curriculum-arrow" class="arrow">▶</span>
                            </button>
                            <div id="indicator-curriculum" class="active-indicator"></div>
                            
                            <!-- Dropdown Content -->
                            <div id="curriculum-options" class="custom-grid-dropdown">
                                <!-- Header Area: Logic Toggle and Clear Button -->
                                <div class="filter-header" style="grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; padding-bottom: 8px; margin-bottom: 8px; border-bottom: 1px solid #eee;">
                                    <!-- Logic Toggle Switch -->
                                    <div class="logic-toggle" title="Toggle Logic: Any (OR) / All (AND)">
                                        <input type="checkbox" id="curriculum-logic-toggle" onchange="toggleCurriculumLogic(this)">
                                        <label for="curriculum-logic-toggle">
                                            <span class="logic-text or">OR</span>
                                            <span class="logic-text and">AND</span>
                                        </label>
                                    </div>
                                    
                                    <!-- Clear Button -->
                                    <button class="clear-btn" onclick="clearCurriculumFilter()">
                                        🗑️ 清除
                                    </button>
                                </div>

                                <!-- Curriculum List Container (Populated by JS) -->
                                <!-- Note: This ID 'curriculum-options' was previously used as the container for items. 
                                    Since we added a header inside, the items should now go into a specific inner container 
                                    or simply append after the header. However, 'populateCurriculumFilter' in utils.js 
                                    targets 'curriculum-options'. We need to adjust the JS or structure slightly.
                                    
                                    BEST APPROACH: Keep 'curriculum-options' as the wrapper, and add a new ID for the list.
                                -->
                                <div id="curriculum-list" style="display: grid; grid-template-columns: 1fr; gap: 5px;">
                                    <!-- JS will populate this -->
                                </div>
                            </div>
                        </div>

                        <!-- Chapters -->
                        <div class="filter-item dropdown-filter">
                            <button class="dropdown-btn" onclick="toggleDropdown('chapter-options')">
                            📖 Chapters <span id="chapter-arrow" class="arrow">▶</span>
                            </button>
                            <div id="indicator-chapter" class="active-indicator"></div>
                            

                            <div id="chapter-options" class="dropdown-content custom-grid-dropdown chapter-grid-width">
                                
                                <!-- The Clear Button Row -->
                                <!-- grid-column: 1 / -1 ensures it spans the full width of the grid -->
                                <div style="grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; padding-bottom: 8px; margin-bottom: 8px; border-bottom: 1px solid #eee;">
                                    <!-- Logic Toggle Switch -->
                                    <div class="logic-toggle" title="切換篩選邏輯: 包含任一 (OR) / 同時包含 (AND)">
                                        <input type="checkbox" id="chapter-logic-toggle" onchange="toggleChapterLogic(this)">
                                        <label for="chapter-logic-toggle">
                                            <span class="logic-text or">OR</span>
                                            <span class="logic-text and">AND</span>
                                        </label>
                                    </div>                                    
                                    <button onclick="clearChapterFilter()" style="background:none; border:none; cursor:pointer; color:#666; font-size:0.9rem; display: flex; align-items: center; gap: 4px;">
                                        🗑️ 清除
                                    </button>
                                </div>

                                <!-- The Container for JS to populate -->
                                <!-- style="display: contents" makes these items act as direct children of the grid -->
                                <div id="chapter-list" style="display: contents;">
                                    <!-- Your utils.js should populate options HERE -->
                                </div>
                            </div>
                        </div>

                        <!-- Features -->
                        <div class="filter-item dropdown-filter">
                            <button class="dropdown-btn" onclick="toggleDropdown('feature-options')">
                               🎯 特徵 <span id="feature-arrow" class="arrow">▶</span>
                            </button>
                            <div id="indicator-feature" class="active-indicator"></div>
                            <!-- This ID is targeted by utils.js to populate options -->
                            <div id="feature-options" class="dropdown-content custom-grid-dropdown">
                                <!-- Populated by JS -->
                            </div>
                        </div>

                        <!-- Percentage Range -->
                        <div class="filter-item dropdown-filter">
                            <button class="dropdown-btn" onclick="toggleDropdown('percentage-options')">
                               📊 答對率 <span id="percentage-arrow" class="arrow">▶</span>
                            </button>
                            <div id="indicator-percentage" class="active-indicator"></div>
                            <div id="percentage-options" class="dropdown-content range-dropdown">
                                <div class="range-filter-wrapper">
                                    <div class="range-filter-header">
                                        <button class="range-clear-btn" onclick="clearPercentageFilter()">🗑️ 清除</button>
                                    </div>
                                    <div class="range-info">
                                        範圍: <span id="min-percentage-display">0</span>% - <span id="max-percentage-display">100</span>%
                                    </div>
                                    <div class="range-slider-container">
                                        <div class="range-slider-track"></div>
                                        <div class="range-slider-fill" id="percentage-range-fill" style="left: 0%; width: 100%;"></div>
                                        <input type="range" id="min-percentage" min="0" max="100" value="0" step="5" class="range-slider-input" oninput="updatePercentageRange()">
                                        <input type="range" id="max-percentage" min="0" max="100" value="100" step="5" class="range-slider-input" oninput="updatePercentageRange()">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Marks Range -->
                        <div class="filter-item dropdown-filter">
                            <button class="dropdown-btn" onclick="toggleDropdown('marks-options')">
                                💯 分數 <span id="marks-arrow" class="arrow">▶</span>
                            </button>
                            <div id="indicator-marks" class="active-indicator"></div>
                            <div id="marks-options" class="dropdown-content range-dropdown marks-filter">
                                <div class="range-filter-wrapper">
                                    <div class="range-filter-header">
                                        <button class="range-clear-btn" onclick="clearMarksFilter()">🗑️ 清除</button>
                                    </div>
                                    <div class="range-info">
                                        範圍: <span id="min-marks-display">0</span> - <span id="max-marks-display">30</span> 分
                                    </div>
                                    <div class="range-slider-container">
                                        <div class="range-slider-track"></div>
                                        <div class="range-slider-fill" id="marks-range-fill" style="left: 0%; width: 100%;"></div>
                                        <input type="range" id="min-marks" min="0" max="30" value="0" step="1" class="range-slider-input" oninput="updateMarksRange()">
                                        <input type="range" id="max-marks" min="0" max="30" value="30" step="1" class="range-slider-input" oninput="updateMarksRange()">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Clear Button -->
                        <div class="filter-item">
                            <button class="btn-clear-filter full-width" onclick="clearFilters()">
                                🔄 重置篩選條件
                            </button>
                        </div>

                    </div>
              
                    <!-- Dynamic Filters Grid -->
                    <div class="filter-primary-grid" style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                        
                        <!-- Graph Filter -->
                        <div class="filter-item input-dropdown-container">
                            <div class="filter-input-wrapper">
                                <input type="text" class="filter-input" placeholder="📊 搜尋圖表類型..." data-filter-type="graph" onkeyup="filterDropdownList(this, 'graph-options')">
                                <span class="active-indicator" id="indicator-graph"></span>
                                <span class="input-arrow">▶</span>
                            </div>
                            <div id="graph-options" class="dropdown-content scrollable-options input-dropdown-list">
                                <!-- Populated by JS -->
                            </div>
                        </div>

                        <!-- Table Filter -->
                        <div class="filter-item input-dropdown-container">
                            <div class="filter-input-wrapper">
                                <input type="text" class="filter-input" placeholder="📅 搜尋表格類型..." data-filter-type="table" onkeyup="filterDropdownList(this, 'table-options')">
                                <span class="active-indicator" id="indicator-table"></span>
                                <span class="input-arrow">▶</span>
                            </div>
                            <div id="table-options" class="dropdown-content scrollable-options input-dropdown-list">
                                <!-- Populated by JS -->
                            </div>
                        </div>

                        <!-- Calculation Filter -->
                        <div class="filter-item input-dropdown-container">
                            <div class="filter-input-wrapper">
                                <input type="text" class="filter-input" placeholder="🧮 搜尋計算類型..." data-filter-type="calculation" onkeyup="filterDropdownList(this, 'calculation-options')">
                                <span class="active-indicator" id="indicator-calculation"></span>
                                <span class="input-arrow">▶</span>
                            </div>
                            <div id="calculation-options" class="dropdown-content scrollable-options input-dropdown-list">
                                <!-- Populated by JS -->
                            </div>
                        </div>

                        <!-- Multiple Selection Filter -->
                        <div class="filter-item input-dropdown-container">
                            <div class="filter-input-wrapper">
                                <input type="text" class="filter-input" placeholder="🔍 搜尋複選類型..." data-filter-type="multipleSelection" onkeyup="filterDropdownList(this, 'multiple-selection-options')">
                                <span class="active-indicator" id="indicator-multipleSelection"></span>
                                <span class="input-arrow">▶</span>
                            </div>
                            <div id="multiple-selection-options" class="dropdown-content scrollable-options input-dropdown-list">
                                <!-- Populated by JS -->
                            </div>
                        </div>

                    </div>

                    <!-- Dynamic Filters Grid for "Concepts, Pattern and AIExplanation" -->
                    <div class="filter-primary-grid" style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                        <!-- Concepts Selection Filter -->
                        <div class="filter-item input-dropdown-container">
                            <div class="filter-input-wrapper">
                                <input type="text" class="filter-input" placeholder="搜尋概念類型..." data-filter-type="conceptsSelection" onkeyup="filterDropdownList(this, 'concepts-options')">
                                <span class="active-indicator" id="indicator-concepts"></span>
                                <span class="input-arrow">▶</span>
                            </div>
                            <div id="concepts-options" class="dropdown-content scrollable-options input-dropdown-list">
                                <!-- Populated by JS -->
                            </div>
                        </div> 
                        <!-- Patterns Selection Filter -->
                        <div class="filter-item input-dropdown-container">
                            <div class="filter-input-wrapper">
                                <input type="text" class="filter-input" placeholder="搜尋題型..." data-filter-type="patternSelection" onkeyup="filterDropdownList(this, 'patterns-options')">
                                <span class="active-indicator" id="indicator-patterns"></span>
                                <span class="input-arrow">▶</span>
                            </div>
                            <div id="patterns-options" class="dropdown-content scrollable-options input-dropdown-list">
                                <!-- Populated by JS -->
                            </div>
                        </div>
                        <!-- AIExplanation Selection Filter-->
                        <div class="dropdown-filter">
                            <button class="dropdown-btn" onclick="toggleDropdown('ai-options')" id="ai-filter-btn">
                                <span>🤖 AI 詳解</span>
                                <div id="indicator-ai" class="filter-indicator"></div>
                                <span class="arrow">▶</span>
                            </button>
                            <div id="ai-options" class="dropdown-content">
                                <!-- Populated by JS (Single option: "Has AI Explanation") -->
                            </div>
                        </div>
                    </div>
                <div style="margin-bottom: 10px; display: flex; align-items: center; gap: 5px;">
                    <input type="checkbox" id="toggle-tags-checkbox" checked onchange="toggleTags(this)">
                    <label for="toggle-tags-checkbox" style="cursor: pointer; user-select: none;">顯示詳細標籤</label>
                </div> 
                </div>
               
                <!-- Add after filter controls, before questions list -->
                <div class="sort-controls">
                    <label for="sort-order">排序方式：</label>
                    <select id="sort-order" onchange="refreshViews()">
                        <option value="default">預設 (年份新→舊，題號小→大)</option>
                        <option value="year-desc">年份 (新→舊)</option>
                        <option value="year-asc">年份 (舊→新)</option>
                        <option value="question-asc">題號 (小→大)</option>
                        <option value="question-desc">題號 (大→小)</option>
                        <option value="marks-asc">分數 (低→高)</option>
                        <option value="marks-desc">分數 (高→低)</option>
                        <option value="percentage-asc">答對率 (低→高)</option>
                        <option value="percentage-desc">答對率 (高→低)</option>                        
                     </select>
                </div>            


                <!-- Question Count and Actions -->
                <div class="action-bar">
                    <h2 id="question-count" style="margin: 0;">總題目數: 0</h2>
                    
                    <!-- Group pagination and admin buttons on the right side -->
                    <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                        
                        <!-- Top Pagination Container -->
                        <div id="pagination-buttons-top" style="display: flex; gap: 5px; flex-wrap: wrap;"></div>
                        
                        <!-- Admin Buttons -->
                        <div class="action-buttons">
                            <button class="btn btn-admin-only btn-outline-primary" onclick="exportJSON()">📥 匯出 JSON</button>
                            <button class="btn btn-admin-only btn-outline-primary" onclick="importJSON()">📤 匯入 JSON</button>
                            <button class="btn btn-admin-only btn-outline-danger" onclick="clearDatabase()">🗑️ 清除資料庫</button>
                            <button class="btn btn-admin-only btn-primary" onclick="toggleForm()">➕ 新增題目</button>
                        </div>
                        
                    </div>
                </div>

                <!-- Add/Edit Question Form (Hidden by default) -->
                <div id="form-section" class="form-container hidden">
                    <h2 id="form-title">新增題目</h2>
                    <form id="question-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="question-id">題目 ID *</label>
                                <input type="text" id="question-id" required>
                            </div>

                            <div class="form-group">
                                <label for="publisher">出版商</label>
                                <input type="text" id="publisher" value="HKEAA">
                            </div>

                            <div class="form-group">
                                <label for="examination">考試類型 *</label>
                                <select id="examination" required>
                                    <option value="HKDSE">HKDSE</option>
                                    <option value="HKCEE">HKCEE</option>
                                    <option value="HKALE">HKALE</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="year">年份 *</label>
                                <input type="number" id="year" required min="1990" max="2030">
                            </div>

                            <div class="form-group">
                                <label for="paper">試卷</label>
                                <input type="text" id="paper" placeholder="例如：P1, P2">
                            </div>

                            <div class="form-group">
                                <label for="question-type">題目類型 *</label>
                                <select id="question-type" required>
                                    <option value="MC">MC</option>
                                    <option value="文字題 (SQ/LQ)">文字題 (SQ/LQ)</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="marks">分數</label>
                                <input type="number" id="marks" step="0.5">
                            </div>

                            <div class="form-group">
                                <label for="section">Section</label>
                                <input type="text" id="section">
                            </div>

                            <div class="form-group">
                                <label for="question-number">題號</label>
                                <input type="text" id="question-number">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="question-text-chi">題目內容 (中文)</label>
                            <textarea id="question-text-chi" rows="4"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="question-text-eng">題目內容 (英文)</label>
                            <textarea id="question-text-eng" rows="4"></textarea>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label for="multiple-selection-type">複選類型</label>
                                <input type="text" id="multiple-selection-type" placeholder="留空則自動填入 '-'">
                            </div>

                            <div class="form-group">
                                <label for="graph-type">圖表類型</label>
                                <input type="text" id="graph-type" placeholder="留空則自動填入 '-'">
                            </div>

                            <div class="form-group">
                                <label for="table-type">表格類型</label>
                                <input type="text" id="table-type" placeholder="留空則自動填入 '-'">
                            </div>

                            <div class="form-group">
                                <label for="calculation-type">計算類型</label>
                                <input type="text" id="calculation-type" placeholder="例如：百分比計算、彈性計算">
                            </div>                            

                            <div class="form-group">
                                <label for="aristo-chapter-classification">Aristo Chapters (用逗號分隔)</label>
                                <input type="text" id="aristo-chapter-classification" placeholder="例如：Ch01, Ch09, Ch11">
                            </div>

                            <div class="form-group">
                                <label for="answer-mc">答案 (MC)</label>
                                <input type="text" id="answer-mc">
                            </div>
                            <div class="form-group">
                                <label for="answer-chi">答案</label>
                                <input type="text" id="answer-chi">
                            </div>
                            <div class="form-group">
                                <label for="answer-eng">Answer</label>
                                <input type="text" id="answer-eng">
                            </div>

                            <div class="form-group">
                                <label for="correct-percentage">答對率 (%)</label>
                                <input type="number" id="correct-percentage" step="0.1" min="0" max="100">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="markers-report-chi">評卷報告</label>
                            <textarea id="markers-report-chi" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="markers-report-eng">Markers Report</label>
                            <textarea id="markers-report-eng" rows="3"></textarea>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label for="curriculum-classification">課程分類 *</label>
                                <div class="multi-select-dropdown simple" id="curriculum-dropdown-container">
                                    <div class="multi-select-selected" id="curriculum-selected-display">
                                        <span class="placeholder">選擇課程分類...</span>
                                    </div>
                                    <div class="multi-select-options" id="curriculum-options">
                                        <div class="options-list" id="curriculum-options-list">
                                            <!-- Dynamically populated by JavaScript -->
                                        </div>
                                    </div>
                                    <!-- 隱藏欄位，儲存逗號分隔字串 -->
                                    <input type="hidden" id="curriculum-classification" name="curriculum-classification">
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="chapter-classification">Chapters (用逗號分隔)</label>
                                <input type="text" id="chapter-classification">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="concepts">涉及概念 (標籤，用逗號分隔)</label>
                            <input type="text" id="concepts" placeholder="例: 機會成本, 彈性, 市場失效">
                        </div>

                        <div class="form-group">
                            <label for="patterns">題型標籤 (用逗號分隔)</label>
                            <input type="text" id="patterns" placeholder="例: 計算題, 繪圖題, 解釋題">
                        </div>

                        <div class="form-group">
                            <label for="option-design">選項設計</label>
                            <textarea id="option-design" rows="2"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="remarks">備註</label>
                            <textarea id="remarks" rows="2"></textarea>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-success">💾 儲存題目</button>
                            <button type="button" class="btn btn-cancel" onclick="cancelEdit()">❌ 取消</button>
                        </div>
                    </form>
                </div>
                
                <!-- Questions Grid -->
                <div id="question-grid" class="question-grid"></div>

                <!-- Pagination -->
                <div class="pagination-container">
                    <div id="pagination-info">
                        <span id="pagination-info-text">顯示 0 題目</span>
                        <select id="items-per-page" onchange="changeItemsPerPage('questions')">
                            <option value="10">每頁 10 題</option>
                            <option value="20" selected>每頁 20 題</option>
                            <option value="50">每頁 50 題</option>
                            <option value="-1">全部</option>
                        </select>
                    </div>
                    <div id="pagination-buttons"></div>
                </div>
            </div>

            <!-- Publishers Tab -->
            <div id="publishers-tab" class="tab-content">
                <h2>出版商統計</h2>
                <div id="publishers-grid" class="stats-grid"></div>
            </div>

            <!-- Topics Tab -->
            <div id="topics-tab" class="tab-content">
                <h2>課程分類統計</h2>
                <div id="topics-grid" class="stats-grid"></div>
            </div>

            <!-- Chapters Tab -->
            <div id="chapters-tab" class="tab-content">
                <h2>Chapters統計</h2>
                <div id="chapters-grid" class="stats-grid"></div>
            </div>

            <!-- Concepts Tab -->
            <div id="concepts-tab" class="tab-content">
                <h2>涉及概念統計</h2>
                <div id="concepts-grid" class="stats-grid"></div>
            </div>

            <!-- Patterns Tab -->
            <div id="patterns-tab" class="tab-content">
                <h2>題型統計</h2>
                <div id="patterns-grid" class="stats-grid"></div>
            </div>
        </main>
    </div>
    <!-- End of Container -->
    <!-- Feedback Modal -->
    <div id="feedback-modal" class="modal hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10001; display: none; align-items: center; justify-content: center;">
        <div class="modal-content" style="background: white; padding: 25px; border-radius: 8px; width: 90%; max-width: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h2 style="margin-top: 0; color: #2c3e50;">📝 題目回報 / 建議</h2>
            <p style="color: #7f8c8d; font-size: 0.9em; margin-bottom: 15px;">
                題目 ID: <span id="feedback-question-id" style="font-weight: bold; color: #2980b9;"></span>
            </p>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">回報內容:</label>
                <textarea id="feedback-text" rows="5" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; resize: vertical;" placeholder="請描述題目錯誤、排版問題或提供建議..."></textarea>
            </div>
            
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button onclick="closeFeedbackModal()" style="padding: 8px 16px; background: #95a5a6; color: white; border: none; border-radius: 4px; cursor: pointer;">取消</button>
                <button onclick="submitFeedback()" style="padding: 8px 16px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer;">送出回報</button>
            </div>
        </div>
    </div>
    <button id="scroll-to-top" onclick="scrollToTop()" title="回到頂部">↑</button>
        <!-- Hidden Admin Toggle -->
        <div style="margin-top: 20px; padding-top: 20px; border-top: 2px solid var(--border-color);">
            <button onclick="toggleAdminMode()" class="btn-secondary" style="opacity: 0.3;">
                🔒 管理員模式
            </button>
            <button id="logout-btn" onclick="window.authManager.logout()" class="btn btn-danger" style="display: none;">
                🚪 登出
            </button>            
            <span id="admin-status" style="margin-left: 10px; color: #95a5a6; font-size: 12px;"></span>
        </div> 

<!-- Core dependencies first -->
<script src="js/globals.js"></script>

<script src="js/utils.js"></script>

<script src="js/forms.js"></script>
<script src="js/sort.js"></script>
<script src="js/render.js"></script>
<script src="js/statistics.js"></script>
<script src="js/tabs.js"></script>
<script src="js/import-export.js"></script>

<!-- Main initialization last -->
<script src="js/main.js"></script>
</body>
